services:
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/keiroqq/diploma-backend}:${IMAGE_TAG:-latest}
    pull_policy: always
    entrypoint: ["/app/migrate"]
    command:
      - -path=/app/migrations
      - -database
      - ${DATABASE_URL}
      - up
    volumes: !reset []

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/keiroqq/diploma-backend}:${IMAGE_TAG:-latest}
    pull_policy: always
    build: !reset null

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/keiroqq/diploma-frontend}:${IMAGE_TAG:-latest}
    pull_policy: always
    build: !reset null
