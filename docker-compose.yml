services:
  postgres:
    image: postgres:16
    container_name: content_digest_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: content_digest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d content_digest"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.3
    profiles:
      - tools
    volumes:
      - ./backend/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
